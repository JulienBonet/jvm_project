services:

  jvm-db:
    image: mysql:8.0
    container_name: jvm-db
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: jvm_project_db
      MYSQL_USER: julius
      MYSQL_PASSWORD: Julius123!
      MYSQL_ROOT_PASSWORD: rootpassword

    volumes:
      - jvm_mysql_data:/var/lib/mysql

  jvm-app:
    build: .
    container_name: jvm-app
    restart: unless-stopped

    depends_on:
      - jvm-db

    ports:
      - "3001:3001"

    env_file:
      - server/.env.production

volumes:
  jvm_mysql_data: